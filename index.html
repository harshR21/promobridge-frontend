<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promobridge - Smart Influencer Matching Platform</title>
    
    <!-- React & ReactDOM from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Axios for API calls -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* TERA ORIGINAL CSS YAHAN DAAL DENA */
        /* Sab kuch same rakha hai - background gradient, navbar, cards, modals, colors sab */
        /* Agar tera original style tag bahut lamba hai toh usko copy-paste kar lena yahan */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #ec4899; --accent: #14b8a6;
            --dark: #0f172a; --dark-light: #1e293b; --gray: #64748b; --light: #f8fafc; --white: #ffffff;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: var(--dark); }
        #root { min-height: 100vh; }
        /* ... tera pura CSS yahan paste kar lena ... */
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const API_BASE_URL = 'https://promobridge-backend0.onrender.com';

        // Token interceptor (login ke baad protected calls pe token auto jaayega)
        axios.interceptors.request.use(config => {
            const token = localStorage.getItem('pb_token');
            if (token) {
                config.headers.Authorization = `Bearer ${token}`;
            }
            return config;
        });

        // Format Indian number (crash fix)
        function formatIndian(num) {
            if (!num || num === 0) return '0';
            if (num >= 10000000) return (num / 10000000).toFixed(1) + ' Cr';
            if (num >= 100000) return (num / 100000).toFixed(1) + ' L';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toLocaleString('en-IN');
        }

        // Indian currency formatter (tera original)
        function formatINR(amount) {
            if (!amount || amount === 0) return '₹0';
            if (amount >= 10000000) return `₹${(amount / 10000000).toFixed(1)} Cr`;
            if (amount >= 100000) return `₹${(amount / 100000).toFixed(1)} L`;
            if (amount >= 1000) return `₹${(amount / 1000).toFixed(1)}K`;
            return `₹${amount.toLocaleString('en-IN')}`;
        }

        // Follower formatter (tera original)
        function formatNumber(num) {
            if (!num || num === 0) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        // Mock influencers (tera original)
        function getMockInfluencers() {
            return [
                { full_name: "Virat Kohli", handle: "virat.kohli", platform: "Instagram", niche: "Fitness", followers_count: 270000000, engagement_rate: 4.2 },
                { full_name: "Bhuvan Bam", handle: "bhuvan.bam22", platform: "YouTube", niche: "Entertainment", followers_count: 26000000, engagement_rate: 5.8 },
                { full_name: "Kusha Kapila", handle: "kushakapila", platform: "Instagram", niche: "Fashion", followers_count: 3500000, engagement_rate: 6.2 },
                { full_name: "Ranveer Allahbadia", handle: "beerbiceps", platform: "YouTube", niche: "Fitness", followers_count: 6000000, engagement_rate: 4.5 },
                { full_name: "Sejal Kumar", handle: "sejalkumar", platform: "YouTube", niche: "Fashion", followers_count: 1500000, engagement_rate: 7.1 },
                { full_name: "Tech Burner", handle: "techburner", platform: "YouTube", niche: "Tech", followers_count: 10000000, engagement_rate: 5.3 }
            ];
        }

        // Main App (tera original structure)
        function App() {
            const [currentPage, setCurrentPage] = useState('home');
            const [showAuth, setShowAuth] = useState(false);
            const [user, setUser] = useState(null);

            const handleLogout = () => {
                setUser(null);
                localStorage.removeItem('pb_token');
            };

            return (
                <div>
                    <Navbar currentPage={currentPage} setCurrentPage={setCurrentPage} user={user} setShowAuth={setShowAuth} handleLogout={handleLogout} />
                    {showAuth && <AuthModal setShowAuth={setShowAuth} setUser={setUser} />}
                    {currentPage === 'home' && <HomePage setCurrentPage={setCurrentPage} />}
                    {currentPage === 'search' && <SearchPage />}
                    {currentPage === 'campaign' && <CampaignPage />}
                    {currentPage === 'pricing' && <PricingPage />}
                    {currentPage === 'dashboard' && <DashboardPage />}
                </div>
            );
        }

        // Navbar (tera original)
        function Navbar({ currentPage, setCurrentPage, user, setShowAuth, handleLogout }) {
            return (
                <nav className="navbar">
                    <div className="logo" onClick={() => setCurrentPage('home')}>🌉 Promobridge</div>
                    <ul className="nav-menu">
                        <li><span className={`nav-link ${currentPage === 'home' ? 'active' : ''}`} onClick={() => setCurrentPage('home')}>Home</span></li>
                        <li><span className={`nav-link ${currentPage === 'search' ? 'active' : ''}`} onClick={() => setCurrentPage('search')}>Find Influencers</span></li>
                        <li><span className={`nav-link ${currentPage === 'campaign' ? 'active' : ''}`} onClick={() => setCurrentPage('campaign')}>Create Campaign</span></li>
                        <li><span className={`nav-link ${currentPage === 'pricing' ? 'active' : ''}`} onClick={() => setCurrentPage('pricing')}>Pricing</span></li>
                        <li><span className={`nav-link ${currentPage === 'dashboard' ? 'active' : ''}`} onClick={() => setCurrentPage('dashboard')}>Dashboard</span></li>
                    </ul>
                    {user ? (
                        <div style={{display:'flex', alignItems:'center', gap:'1rem'}}>
                            <span style={{fontWeight:600, color:'var(--primary)'}}>👤 {user.email.split('@')[0]}</span>
                            <button className="btn btn-secondary" onClick={handleLogout}>Logout</button>
                        </div>
                    ) : (
                        <button className="btn btn-primary" onClick={() => setShowAuth(true)}>Login / Register</button>
                    )}
                </nav>
            );
        }

        // Auth Modal (token sahi save hoga ab)
        function AuthModal({ setShowAuth, setUser }) {
            const [tab, setTab] = useState('login');
            const [form, setForm] = useState({ email: '', password: '', role: 'brand' });
            const [msg, setMsg] = useState(null);
            const [error, setError] = useState(null);
            const [loading, setLoading] = useState(false);

            const handleLogin = async () => {
                setLoading(true); setError(null); setMsg(null);
                try {
                    const formData = new URLSearchParams();
                    formData.append('username', form.email);
                    formData.append('password', form.password);
                    const res = await axios.post(`${API_BASE_URL}/auth/login`, formData, {
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                    });
                    const token = res.data.access_token;
                    localStorage.setItem('pb_token', token);
                    setUser({ email: form.email, role: res.data.role || 'brand' });
                    setShowAuth(false);
                } catch (e) {
                    setError(e.response?.data?.detail || 'Login failed');
                }
                setLoading(false);
            };

            const handleRegister = async () => {
                setLoading(true); setError(null); setMsg(null);
                try {
                    await axios.post(`${API_BASE_URL}/auth/register`, form);
                    setMsg('Account created! Please login.');
                    setTab('login');
                } catch (e) {
                    setError(e.response?.data?.detail || 'Registration failed');
                }
                setLoading(false);
            };

            return (
                <div className="modal-overlay" onClick={() => setShowAuth(false)}>
                    <div className="modal" onClick={e => e.stopPropagation()}>
                        <button className="modal-close" onClick={() => setShowAuth(false)}>✕</button>
                        <h2>🌉 Promobridge</h2>
                        <p style={{color: 'var(--gray)', marginBottom: '1.5rem'}}>Connect brands with influencers</p>
                        <div className="modal-tabs">
                            <button className={`modal-tab ${tab === 'login' ? 'active' : ''}`} onClick={() => setTab('login')}>Login</button>
                            <button className={`modal-tab ${tab === 'register' ? 'active' : ''}`} onClick={() => setTab('register')}>Register</button>
                        </div>
                        {msg && <div className="alert-success">{msg}</div>}
                        {error && <div className="alert-error">{error}</div>}
                        <div className="form-group">
                            <label className="form-label">Email</label>
                            <input type="email" className="form-input" placeholder="you@example.com"
                                value={form.email} onChange={e => setForm({...form, email: e.target.value})} />
                        </div>
                        <div className="form-group">
                            <label className="form-label">Password</label>
                            <input type="password" className="form-input" placeholder="••••••••"
                                value={form.password} onChange={e => setForm({...form, password: e.target.value})} />
                        </div>
                        {tab === 'register' && (
                            <div className="form-group">
                                <label className="form-label">I am a...</label>
                                <select className="form-select" value={form.role} onChange={e => setForm({...form, role: e.target.value})}>
                                    <option value="brand">Brand</option>
                                    <option value="influencer">Influencer</option>
                                </select>
                            </div>
                        )}
                        <button className="btn btn-primary" style={{width: '100%', padding: '1rem', marginTop: '0.5rem'}}
                            onClick={tab === 'login' ? handleLogin : handleRegister}
                            disabled={loading}>
                            {loading ? '⏳ Please wait...' : tab === 'login' ? '🔑 Login' : '🚀 Create Account'}
                        </button>
                    </div>
                </div>
            );
        }

        // HomePage (tera original)
        function HomePage({ setCurrentPage }) {
            return (
                <div>
                    <section className="hero">
                        <h1>Smart Influencer<br/>Brand Matching</h1>
                        <p>
                            AI-powered platform connecting brands with perfect influencers.
                            Transparent pricing, fraud detection, and data-driven recommendations.
                        </p>
                        <div className="hero-buttons">
                            <button className="btn btn-primary" onClick={() => setCurrentPage('search')}>🔍 Find Influencers</button>
                            <button className="btn btn-secondary" onClick={() => setCurrentPage('campaign')}>🚀 Create Campaign</button>
                            <button className="btn btn-secondary" onClick={() => setCurrentPage('pricing')}>💰 Calculate Pricing</button>
                        </div>
                    </section>
                    <div className="container">
                        <StatsSection />
                    </div>
                </div>
            );
        }

        // StatsSection (real API call)
        function StatsSection() {
            const [stats, setStats] = useState(null);
            useEffect(() => {
                axios.get(`${API_BASE_URL}/stats`)
                    .then(response => setStats(response.data))
                    .catch(() => setStats({total_influencers: 20, total_brands: 0, total_campaigns: 0, success_rate: 95}));
            }, []);
            if (!stats) return <div className="loading"><div className="spinner"></div>Loading stats...</div>;
            return (
                <div className="stats-grid">
                    <div className="stat-card">
                        <div className="stat-card-value">{stats.total_influencers}+</div>
                        <div className="stat-card-label">Active Influencers</div>
                    </div>
                    <div className="stat-card">
                        <div className="stat-card-value">{stats.total_brands}+</div>
                        <div className="stat-card-label">Brands</div>
                    </div>
                    <div className="stat-card">
                        <div className="stat-card-value">{stats.total_campaigns}+</div>
                        <div className="stat-card-label">Campaigns</div>
                    </div>
                    <div className="stat-card">
                        <div className="stat-card-value">{stats.success_rate}%</div>
                        <div className="stat-card-label">Success Rate</div>
                    </div>
                </div>
            );
        }

        // SearchPage (influencers real + mock fallback)
        function SearchPage() {
            const [influencers, setInfluencers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [filters, setFilters] = useState({platform: '', niche: '', minFollowers: ''});

            useEffect(() => { fetchInfluencers(); }, []);

            const fetchInfluencers = () => {
                setLoading(true);
                const params = {};
                if (filters.platform) params.platform = filters.platform;
                if (filters.niche) params.niche = filters.niche;
                if (filters.minFollowers) params.min_followers = filters.minFollowers;

                axios.get(`${API_BASE_URL}/influencers`, { params })
                    .then(response => {
                        setInfluencers(response.data || []);
                        setLoading(false);
                    })
                    .catch(() => {
                        setInfluencers(getMockInfluencers());
                        setLoading(false);
                    });
            };

            return (
                <div className="container">
                    <div className="search-container">
                        <h2 style={{marginBottom: '1.5rem', fontFamily: 'Outfit', fontSize: '2rem'}}>🔍 Find Perfect Influencers</h2>
                        <div className="search-bar">
                            <select className="form-select" value={filters.platform} onChange={e => setFilters({...filters, platform: e.target.value})}>
                                <option value="">All Platforms</option>
                                <option value="instagram">Instagram</option>
                                <option value="youtube">YouTube</option>
                                <option value="tiktok">TikTok</option>
                            </select>
                            <select className="form-select" value={filters.niche} onChange={e => setFilters({...filters, niche: e.target.value})}>
                                <option value="">All Niches</option>
                                <option value="Fitness">Fitness</option>
                                <option value="Fashion">Fashion</option>
                                <option value="Tech">Tech</option>
                                <option value="Food">Food</option>
                                <option value="Travel">Travel</option>
                            </select>
                            <input type="number" className="form-input" placeholder="Min Followers" value={filters.minFollowers} onChange={e => setFilters({...filters, minFollowers: e.target.value})} />
                            <button className="btn btn-primary" onClick={fetchInfluencers}>Search</button>
                        </div>
                    </div>
                    {loading ? (
                        <div className="loading"><div className="spinner"></div>Loading influencers...</div>
                    ) : influencers.length === 0 ? (
                        <div className="card" style={{textAlign:'center', padding:'3rem'}}>No influencers found. Try different filters.</div>
                    ) : (
                        <div className="card-grid">
                            {influencers.map((inf, index) => (
                                <InfluencerCard key={index} influencer={inf} />
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        // InfluencerCard (tera original + formatIndian fix)
        function InfluencerCard({ influencer }) {
            const [showModal, setShowModal] = useState(false);
            const matchScore = Math.floor(Math.random() * 15 + 82);
            const price = Math.floor((influencer.followers_count / 1000) * 830 * (1 + (influencer.engagement_rate || 0) / 100));

            return (
                <>
                    <div className="influencer-card" onClick={() => setShowModal(true)}>
                        <div style={{position:'relative', width:100, height:100, margin:'0 auto 1rem'}}>
                            <div className="influencer-avatar">{influencer.full_name?.[0] || '?'}</div>
                            <div style={{position:'absolute', bottom:2, right:2, background:'#E1306C', borderRadius:'50%', width:28, height:28, display:'flex', alignItems:'center', justifyContent:'center', fontSize:'0.75rem', border:'2px solid white'}}>
                                {influencer.platform === 'instagram' ? '📸' : influencer.platform === 'youtube' ? '▶️' : '🌐'}
                            </div>
                        </div>
                        <div className="influencer-name">{influencer.full_name}</div>
                        <div className="influencer-handle">@{influencer.handle}</div>
                        <div style={{margin:'0.5rem 0'}}>
                            <span className="badge badge-primary">{influencer.platform}</span>
                            <span className="badge badge-primary" style={{background: '#6366f133'}}>{influencer.niche || 'General'}</span>
                        </div>
                        <div style={{background:'rgba(255,255,255,0.15)', borderRadius:12, padding:'0.5rem', margin:'0.5rem 0', fontSize:'0.85rem'}}>
                            ✅ Match Score: <strong>{matchScore}%</strong>
                        </div>
                        <div className="stats-row">
                            <div className="stat">
                                <span className="stat-value">{formatIndian(influencer.followers_count || 0)}</span>
                                <span className="stat-label">Followers</span>
                            </div>
                            <div className="stat">
                                <span className="stat-value">{influencer.engagement_rate || 0}%</span>
                                <span className="stat-label">Engagement</span>
                            </div>
                            <div className="stat">
                                <span className="stat-value">{formatINR(price)}</span>
                                <span className="stat-label">Est. Price</span>
                            </div>
                        </div>
                    </div>
                    {showModal && (
                        <div className="modal-overlay" onClick={() => setShowModal(false)}>
                            <div className="modal" onClick={e => e.stopPropagation()}>
                                <button className="modal-close" onClick={() => setShowModal(false)}>✕</button>
                                <h2>{influencer.full_name}</h2>
                                <p>@{influencer.handle}</p>
                                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'1rem'}}>
                                    <div><strong>Followers:</strong> {formatIndian(influencer.followers_count)}</div>
                                    <div><strong>Engagement:</strong> {influencer.engagement_rate}%</div>
                                    <div><strong>Price:</strong> {formatINR(price)}</div>
                                </div>
                                <button className="btn btn-primary" style={{marginTop:'1rem'}} onClick={() => setShowModal(false)}>Close</button>
                            </div>
                        </div>
                    )}
                </>
            );
        }

        // PricingPage (tera original + API fix)
        function PricingPage() {
            const [inputs, setInputs] = useState({
                followers: 50000,
                engagement_rate: 3.5,
                platform: 'instagram',
                content_type: 'post'
            });
            const [result, setResult] = useState(null);

            const calculatePricing = () => {
                axios.post(`${API_BASE_URL}/calculate-pricing`, null, {
                    params: inputs
                })
                    .then(response => {
                        const d = response.data;
                        setResult({
                            suggested_price: Math.round(d.suggested_price * 83),
                            min_price: Math.round(d.min_price * 83),
                            max_price: Math.round(d.max_price * 83),
                        });
                    })
                    .catch(error => {
                        const price = (inputs.followers / 1000) * 830 * (1 + inputs.engagement_rate / 100);
                        setResult({
                            suggested_price: Math.round(price),
                            min_price: Math.round(price * 0.8),
                            max_price: Math.round(price * 1.2),
                        });
                    });
            };

            return (
                <div className="container">
                    <div className="card">
                        <h2 style={{marginBottom: '2rem', fontFamily: 'Outfit', fontSize: '2.5rem'}}>💰 Pricing Calculator</h2>
                        <div className="form-group">
                            <label className="form-label">Number of Followers</label>
                            <input type="number" className="form-input" value={inputs.followers} onChange={e => setInputs({...inputs, followers: +e.target.value})} />
                        </div>
                        <div className="form-group">
                            <label className="form-label">Engagement Rate (%)</label>
                            <input type="number" step="0.1" className="form-input" value={inputs.engagement_rate} onChange={e => setInputs({...inputs, engagement_rate: +e.target.value})} />
                        </div>
                        <div className="form-group">
                            <label className="form-label">Platform</label>
                            <select className="form-select" value={inputs.platform} onChange={e => setInputs({...inputs, platform: e.target.value})}>
                                <option value="instagram">Instagram</option>
                                <option value="youtube">YouTube</option>
                                <option value="tiktok">TikTok</option>
                            </select>
                        </div>
                        <div className="form-group">
                            <label className="form-label">Content Type</label>
                            <select className="form-select" value={inputs.content_type} onChange={e => setInputs({...inputs, content_type: e.target.value})}>
                                <option value="post">Post</option>
                                <option value="story">Story</option>
                                <option value="reel">Reel/Video</option>
                            </select>
                        </div>
                        <button className="btn btn-primary" style={{width: '100%', padding: '1.2rem'}} onClick={calculatePricing}>
                            Calculate Suggested Pricing
                        </button>
                        {result && (
                            <div className="pricing-result">
                                <h3 style={{fontSize: '1.5rem', marginBottom: '1rem'}}>💰 Suggested Pricing (Indian Rupees)</h3>
                                <div className="price-display">{formatINR(result.suggested_price)}</div>
                                <p style={{fontSize: '1.2rem', opacity: 0.9}}>
                                    Range: {formatINR(result.min_price)} — {formatINR(result.max_price)}
                                </p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // Placeholder pages (tera original jaisa)
        function CampaignPage() {
            return <div className="container"><h2>Create Campaign (Demo - backend route add karna padega)</h2></div>;
        }

        function DashboardPage() {
            return <div className="container"><h2>Dashboard (Coming Soon)</h2></div>;
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
