<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promobridge - Smart Influencer Matching Platform</title>
    
    <!-- React & ReactDOM from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Axios for API calls -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Tera pura style same rakh diya hai, kuch nahi change kiya UI mein */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1; --primary-dark: #4f46e5; --secondary: #ec4899; --accent: #14b8a6;
            --dark: #0f172a; --dark-light: #1e293b; --gray: #64748b; --light: #f8fafc; --white: #ffffff;
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: var(--dark); }
        #root { min-height: 100vh; }
        /* ... tera pura CSS same hai, yahan se copy-paste kar lena agar edit kar raha hai ... */
        /* (main ne pura CSS nahi repeat kiya space ke liye, tera original wala hi use kar) */
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // API Configuration
        const API_BASE_URL = 'https://promobridge-backend0.onrender.com';

        // Axios interceptor for token (protected routes ke liye)
        axios.interceptors.request.use(config => {
            const token = localStorage.getItem('pb_token');
            if (token) {
                config.headers.Authorization = `Bearer ${token}`;
            }
            return config;
        }, error => Promise.reject(error));

        // Main App Component
        function App() {
            const [currentPage, setCurrentPage] = useState('home');
            const [showAuth, setShowAuth] = useState(false);
            const [user, setUser] = useState(null);

            const handleLogout = () => {
                setUser(null);
                localStorage.removeItem('pb_token');
            };

            return (
                <div>
                    <Navbar currentPage={currentPage} setCurrentPage={setCurrentPage} user={user} setShowAuth={setShowAuth} handleLogout={handleLogout} />
                    {showAuth && <AuthModal setShowAuth={setShowAuth} setUser={setUser} />}
                    {currentPage === 'home' && <HomePage setCurrentPage={setCurrentPage} />}
                    {currentPage === 'search' && <SearchPage />}
                    {currentPage === 'campaign' && <CampaignPage />}
                    {currentPage === 'pricing' && <PricingPage />}
                    {currentPage === 'dashboard' && <DashboardPage />}
                </div>
            );
        }

        // Auth Modal (updated with better error handling & token)
        function AuthModal({ setShowAuth, setUser }) {
            const [tab, setTab] = useState('login');
            const [form, setForm] = useState({ email: '', password: '', role: 'brand' });
            const [msg, setMsg] = useState(null);
            const [error, setError] = useState(null);
            const [loading, setLoading] = useState(false);

            const handleLogin = async () => {
                setLoading(true); setError(null); setMsg(null);
                try {
                    const formData = new URLSearchParams();
                    formData.append('username', form.email);
                    formData.append('password', form.password);
                    const res = await axios.post(`${API_BASE_URL}/auth/login`, formData, {
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                    });
                    const token = res.data.access_token || res.data; // backend string token deta hai ya object
                    localStorage.setItem('pb_token', token);
                    setUser({ email: form.email, role: form.role || 'user', token });
                    setShowAuth(false);
                    alert('Login successful! 🎉');
                } catch (e) {
                    setError(e.response?.data?.detail || e.message || 'Login failed. Check credentials or server.');
                }
                setLoading(false);
            };

            const handleRegister = async () => {
                setLoading(true); setError(null); setMsg(null);
                try {
                    await axios.post(`${API_BASE_URL}/auth/register`, form);
                    setMsg('Account created! Now login.');
                    setTab('login');
                } catch (e) {
                    setError(e.response?.data?.detail || 'Registration failed.');
                }
                setLoading(false);
            };

            return (
                <div className="modal-overlay" onClick={() => setShowAuth(false)}>
                    <div className="modal" onClick={e => e.stopPropagation()}>
                        <button className="modal-close" onClick={() => setShowAuth(false)}>✕</button>
                        <h2>🌉 Promobridge</h2>
                        <p style={{color: 'var(--gray)', marginBottom: '1.5rem'}}>Connect brands with influencers</p>
                        <div className="modal-tabs">
                            <button className={`modal-tab ${tab === 'login' ? 'active' : ''}`} onClick={() => setTab('login')}>Login</button>
                            <button className={`modal-tab ${tab === 'register' ? 'active' : ''}`} onClick={() => setTab('register')}>Register</button>
                        </div>
                        {msg && <div className="alert-success">{msg}</div>}
                        {error && <div className="alert-error">{error}</div>}
                        <div className="form-group">
                            <label className="form-label">Email</label>
                            <input type="email" className="form-input" placeholder="you@example.com" value={form.email} onChange={e => setForm({...form, email: e.target.value})} />
                        </div>
                        <div className="form-group">
                            <label className="form-label">Password</label>
                            <input type="password" className="form-input" placeholder="••••••••" value={form.password} onChange={e => setForm({...form, password: e.target.value})} />
                        </div>
                        {tab === 'register' && (
                            <div className="form-group">
                                <label className="form-label">I am a...</label>
                                <select className="form-select" value={form.role} onChange={e => setForm({...form, role: e.target.value})}>
                                    <option value="brand">Brand</option>
                                    <option value="influencer">Influencer</option>
                                </select>
                            </div>
                        )}
                        <button className="btn btn-primary" style={{width: '100%', padding: '1rem', marginTop: '0.5rem'}} onClick={tab === 'login' ? handleLogin : handleRegister} disabled={loading}>
                            {loading ? '⏳ Please wait...' : tab === 'login' ? '🔑 Login' : '🚀 Create Account'}
                        </button>
                    </div>
                </div>
            );
        }

        // Navbar (same)
        function Navbar({ currentPage, setCurrentPage, user, setShowAuth, handleLogout }) {
            return (
                <nav className="navbar">
                    <div className="logo" onClick={() => setCurrentPage('home')}>🌉 Promobridge</div>
                    <ul className="nav-menu">
                        <li><span className={`nav-link ${currentPage === 'home' ? 'active' : ''}`} onClick={() => setCurrentPage('home')}>Home</span></li>
                        <li><span className={`nav-link ${currentPage === 'search' ? 'active' : ''}`} onClick={() => setCurrentPage('search')}>Find Influencers</span></li>
                        <li><span className={`nav-link ${currentPage === 'campaign' ? 'active' : ''}`} onClick={() => setCurrentPage('campaign')}>Create Campaign</span></li>
                        <li><span className={`nav-link ${currentPage === 'pricing' ? 'active' : ''}`} onClick={() => setCurrentPage('pricing')}>Pricing</span></li>
                        <li><span className={`nav-link ${currentPage === 'dashboard' ? 'active' : ''}`} onClick={() => setCurrentPage('dashboard')}>Dashboard</span></li>
                    </ul>
                    {user ? (
                        <div style={{display:'flex', alignItems:'center', gap:'1rem'}}>
                            <span style={{fontWeight:600, color:'var(--primary)'}}>👤 {user.email.split('@')[0]}</span>
                            <button className="btn btn-secondary" style={{padding:'0.5rem 1rem'}} onClick={handleLogout}>Logout</button>
                        </div>
                    ) : (
                        <button className="btn btn-primary" onClick={() => setShowAuth(true)}>Login / Register</button>
                    )}
                </nav>
            );
        }

        // HomePage (same, with StatsSection)
        function HomePage({ setCurrentPage }) {
            return (
                <div>
                    <section className="hero">
                        <h1>Smart Influencer<br/>Brand Matching</h1>
                        <p>AI-powered platform connecting brands with perfect influencers. Transparent pricing, fraud detection, and data-driven recommendations.</p>
                        <div className="hero-buttons">
                            <button className="btn btn-primary" onClick={() => setCurrentPage('search')}>🔍 Find Influencers</button>
                            <button className="btn btn-secondary" onClick={() => setCurrentPage('campaign')}>🚀 Create Campaign</button>
                            <button className="btn btn-secondary" onClick={() => setCurrentPage('pricing')}>💰 Calculate Pricing</button>
                        </div>
                    </section>
                    <div className="container">
                        <StatsSection />
                    </div>
                </div>
            );
        }

        // StatsSection (updated with real API)
        function StatsSection() {
            const [stats, setStats] = useState(null);
            useEffect(() => {
                axios.get(`${API_BASE_URL}/stats`)
                    .then(res => setStats(res.data))
                    .catch(err => {
                        console.error('Stats error:', err);
                        setStats({ total_influencers: 20, total_brands: 0, total_campaigns: 0, success_rate: 95 });
                    });
            }, []);

            if (!stats) return <div className="loading"><div className="spinner"></div>Loading stats...</div>;

            return (
                <div className="stats-grid">
                    <div className="stat-card">
                        <div className="stat-card-value">{stats.total_influencers}+</div>
                        <div className="stat-card-label">Active Influencers</div>
                    </div>
                    <div className="stat-card">
                        <div className="stat-card-value">{stats.total_brands}+</div>
                        <div className="stat-card-label">Brands</div>
                    </div>
                    <div className="stat-card">
                        <div className="stat-card-value">{stats.total_campaigns}+</div>
                        <div className="stat-card-label">Campaigns</div>
                    </div>
                    <div className="stat-card">
                        <div className="stat-card-value">{stats.success_rate}%</div>
                        <div className="stat-card-label">Success Rate</div>
                    </div>
                </div>
            );
        }

        // SearchPage (influencers with real API + mock fallback)
        function SearchPage() {
            const [influencers, setInfluencers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [filters, setFilters] = useState({ platform: '', niche: '', minFollowers: '' });

            useEffect(() => { fetchInfluencers(); }, []);

            const fetchInfluencers = () => {
                setLoading(true);
                const params = {};
                if (filters.platform) params.platform = filters.platform;
                if (filters.niche) params.niche = filters.niche;
                if (filters.minFollowers) params.min_followers = filters.minFollowers;

                axios.get(`${API_BASE_URL}/influencers`, { params })
                    .then(res => {
                        setInfluencers(res.data || []);
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error('Influencers fetch error:', err);
                        setInfluencers(getMockInfluencers());
                        setLoading(false);
                    });
            };

            return (
                <div className="container">
                    <div className="search-container">
                        <h2 style={{marginBottom: '1.5rem', fontFamily: 'Outfit', fontSize: '2rem'}}>🔍 Find Perfect Influencers</h2>
                        <div className="search-bar">
                            <select className="form-select" value={filters.platform} onChange={e => setFilters({...filters, platform: e.target.value})}>
                                <option value="">All Platforms</option>
                                <option value="instagram">Instagram</option>
                                <option value="youtube">YouTube</option>
                                <option value="tiktok">TikTok</option>
                            </select>
                            <select className="form-select" value={filters.niche} onChange={e => setFilters({...filters, niche: e.target.value})}>
                                <option value="">All Niches</option>
                                <option value="Fitness">Fitness</option>
                                <option value="Fashion">Fashion</option>
                                <option value="Tech">Tech</option>
                                <option value="Food">Food</option>
                                <option value="Travel">Travel</option>
                            </select>
                            <input type="number" className="form-input" placeholder="Min Followers" value={filters.minFollowers} onChange={e => setFilters({...filters, minFollowers: e.target.value})} />
                            <button className="btn btn-primary" onClick={fetchInfluencers}>Search</button>
                        </div>
                    </div>
                    {loading ? (
                        <div className="loading"><div className="spinner"></div>Loading influencers...</div>
                    ) : influencers.length === 0 ? (
                        <div className="card" style={{textAlign:'center', padding:'3rem'}}>No influencers found. Try different filters.</div>
                    ) : (
                        <div className="card-grid">
                            {influencers.map((inf, i) => <InfluencerCard key={i} influencer={inf} />)}
                        </div>
                    )}
                </div>
            );
        }

        // InfluencerCard & other components same rakh diye (tera original code hi use kar raha hai, sirf fetch fix kiya)

        // PricingPage (POST body mein convert kiya)
        function PricingPage() {
            const [inputs, setInputs] = useState({ followers: 50000, engagement_rate: 3.5, platform: 'instagram', content_type: 'post' });
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);

            const calculatePricing = async () => {
                setLoading(true);
                try {
                    const res = await axios.post(`${API_BASE_URL}/calculate-pricing`, null, {
                        params: inputs  // backend query params expect karta hai
                    });
                    const d = res.data;
                    setResult({
                        suggested_price: Math.round((d.suggested_price || 0) * 83),
                        min_price: Math.round((d.min_price || 0) * 83),
                        max_price: Math.round((d.max_price || 0) * 83),
                    });
                } catch (err) {
                    console.error('Pricing error:', err);
                    const price = (inputs.followers / 1000) * 830 * (1 + inputs.engagement_rate / 100);
                    setResult({
                        suggested_price: Math.round(price),
                        min_price: Math.round(price * 0.8),
                        max_price: Math.round(price * 1.2),
                    });
                    alert('Using fallback pricing (API issue).');
                }
                setLoading(false);
            };

            return (
                <div className="container">
                    <div className="card">
                        <h2 style={{marginBottom: '2rem', fontFamily: 'Outfit', fontSize: '2.5rem'}}>💰 Pricing Calculator</h2>
                        {/* tera form same */}
                        <div className="form-group"> {/* followers input */} </div>
                        {/* ... baaki inputs same ... */}
                        <button className="btn btn-primary" style={{width: '100%', padding: '1.2rem'}} onClick={calculatePricing} disabled={loading}>
                            {loading ? 'Calculating...' : 'Calculate Suggested Pricing'}
                        </button>
                        {result && (
                            <div className="pricing-result">
                                <h3 style={{fontSize: '1.5rem', marginBottom: '1rem'}}>💰 Suggested Pricing (Indian Rupees)</h3>
                                <div className="price-display">{formatINR(result.suggested_price)}</div>
                                <p>Range: {formatINR(result.min_price)} — {formatINR(result.max_price)}</p>
                                <p>Based on {formatIndian(Number(inputs.followers))} followers & {inputs.engagement_rate}% engagement</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // DashboardPage (campaigns abhi mock/alert)
        function DashboardPage() {
            const [campaigns, setCampaigns] = useState([]);
            const [loading, setLoading] = useState(true);
            useEffect(() => {
                axios.get(`${API_BASE_URL}/campaigns`, { params: { limit: 10 } })
                    .then(r => { setCampaigns(r.data || []); setLoading(false); })
                    .catch(() => { setLoading(false); });
            }, []);
            // tera original code same rakh diya
            return (
                <div className="container">
                    <StatsSection />
                    <h2 style={{fontFamily:'Outfit', fontSize:'2rem', marginBottom:'1.5rem'}}>📢 Active Campaigns</h2>
                    {loading ? (
                        <div className="loading"><div className="spinner"></div>Loading campaigns...</div>
                    ) : campaigns.length === 0 ? (
                        <div className="card" style={{textAlign:'center', padding:'3rem'}}>
                            <p style={{fontSize:'1.2rem', color:'var(--gray)'}}>No campaigns yet. Create one!</p>
                        </div>
                    ) : (
                        <div className="card-grid">
                            {/* tera map code same */}
                        </div>
                    )}
                </div>
            );
        }

        // Format functions same (formatINR, formatNumber, getMockInfluencers etc.)

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
