<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const API_BASE_URL = 'https://promobridge-backend0.onrender.com';

        // Token interceptor — login ke baad token auto jaayega protected calls pe
        axios.interceptors.request.use(config => {
            const token = localStorage.getItem('pb_token');
            if (token) {
                config.headers.Authorization = `Bearer ${token}`;
            }
            return config;
        });

        // Main App Component (tera original)
        function App() {
            const [currentPage, setCurrentPage] = useState('home');
            const [showAuth, setShowAuth] = useState(false);
            const [user, setUser] = useState(null);

            const handleLogout = () => {
                setUser(null);
                localStorage.removeItem('pb_token');
            };

            return (
                <div>
                    <Navbar currentPage={currentPage} setCurrentPage={setCurrentPage} user={user} setShowAuth={setShowAuth} handleLogout={handleLogout} />
                    {showAuth && <AuthModal setShowAuth={setShowAuth} setUser={setUser} />}
                    {currentPage === 'home' && <HomePage setCurrentPage={setCurrentPage} />}
                    {currentPage === 'search' && <SearchPage />}
                    {currentPage === 'campaign' && <CampaignPage />}
                    {currentPage === 'pricing' && <PricingPage />}
                    {currentPage === 'dashboard' && <DashboardPage />}
                </div>
            );
        }

        // Auth Modal (tera original + token fix)
        function AuthModal({ setShowAuth, setUser }) {
            const [tab, setTab] = useState('login');
            const [form, setForm] = useState({ email: '', password: '', role: 'brand' });
            const [msg, setMsg] = useState(null);
            const [error, setError] = useState(null);
            const [loading, setLoading] = useState(false);

            const handleLogin = async () => {
                setLoading(true); setError(null); setMsg(null);
                try {
                    const formData = new URLSearchParams();
                    formData.append('username', form.email);
                    formData.append('password', form.password);
                    const res = await axios.post(`${API_BASE_URL}/auth/login`, formData, {
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                    });
                    const token = res.data.access_token || res.data.token || res.data; // backend ke response ke hisaab se adjust
                    localStorage.setItem('pb_token', token);
                    setUser({ email: form.email, role: form.role || 'brand' });
                    setShowAuth(false);
                } catch (e) {
                    setError(e.response?.data?.detail || e.message || 'Login failed');
                }
                setLoading(false);
            };

            const handleRegister = async () => {
                setLoading(true); setError(null); setMsg(null);
                try {
                    await axios.post(`${API_BASE_URL}/auth/register`, form);
                    setMsg('Account created! Please login.');
                    setTab('login');
                } catch (e) {
                    setError(e.response?.data?.detail || 'Registration failed');
                }
                setLoading(false);
            };

            // TERA ORIGINAL MODAL RETURN CODE YAHAN PASTE KAR DENA (button, form, tabs sab same)
            // sirf handleLogin aur handleRegister upar wale use kar
            // example placeholder (tera actual code daal dena):
            return (
                <div className="modal-overlay" onClick={() => setShowAuth(false)}>
                    <div className="modal" onClick={e => e.stopPropagation()}>
                        <button className="modal-close" onClick={() => setShowAuth(false)}>✕</button>
                        <h2>🌉 Promobridge</h2>
                        <div className="modal-tabs">
                            <button className={`modal-tab ${tab === 'login' ? 'active' : ''}`} onClick={() => setTab('login')}>Login</button>
                            <button className={`modal-tab ${tab === 'register' ? 'active' : ''}`} onClick={() => setTab('register')}>Register</button>
                        </div>
                        {msg && <div className="alert-success">{msg}</div>}
                        {error && <div className="alert-error">{error}</div>}
                        <div className="form-group">
                            <label>Email</label>
                            <input type="email" value={form.email} onChange={e => setForm({...form, email: e.target.value})} />
                        </div>
                        <div className="form-group">
                            <label>Password</label>
                            <input type="password" value={form.password} onChange={e => setForm({...form, password: e.target.value})} />
                        </div>
                        {tab === 'register' && (
                            <div className="form-group">
                                <label>Role</label>
                                <select value={form.role} onChange={e => setForm({...form, role: e.target.value})}>
                                    <option value="brand">Brand</option>
                                    <option value="influencer">Influencer</option>
                                </select>
                            </div>
                        )}
                        <button className="btn btn-primary" onClick={tab === 'login' ? handleLogin : handleRegister} disabled={loading}>
                            {loading ? 'Loading...' : tab === 'login' ? 'Login' : 'Register'}
                        </button>
                    </div>
                </div>
            );
        }

        // PricingPage (tera original + POST fix)
        function PricingPage() {
            const [inputs, setInputs] = useState({
                followers: 50000,
                engagement_rate: 3.5,
                platform: 'instagram',
                content_type: 'post'
            });
            const [result, setResult] = useState(null);

            const calculatePricing = () => {
                axios.post(`${API_BASE_URL}/calculate-pricing`, null, { params: inputs })
                    .then(response => {
                        const d = response.data;
                        setResult({
                            suggested_price: Math.round(d.suggested_price * 83),
                            min_price: Math.round(d.min_price * 83),
                            max_price: Math.round(d.max_price * 83),
                        });
                    })
                    .catch(error => {
                        const price = (inputs.followers / 1000) * 830 * (1 + inputs.engagement_rate / 100);
                        setResult({
                            suggested_price: Math.round(price),
                            min_price: Math.round(price * 0.8),
                            max_price: Math.round(price * 1.2),
                        });
                    });
            };

            // TERA ORIGINAL RETURN CODE YAHAN PASTE KAR DENA (form, button, result display sab same)
            // sirf calculatePricing upar wala use kar
        }

            // {formatIndian(influencer.followers_count || 0)}

        // Yeh missing function add kiya (crash ka root cause tha)
        function formatIndian(num) {
            if (!num || num === 0) return '0';
            if (num >= 10000000) return (num / 10000000).toFixed(1) + ' Cr';
            if (num >= 100000) return (num / 100000).toFixed(1) + ' L';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toLocaleString('en-IN');
        }

        // Tera baaki sab code same rahega (formatINR, formatNumber, getMockInfluencers, etc.)

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
