<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promobridge — India's Influencer Marketing Platform</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #7C3AED;
            --primary-light: #8B5CF6;
            --primary-dark: #6D28D9;
            --accent: #F59E0B;
            --accent2: #EC4899;
            --dark: #0D0D1A;
            --dark2: #13132B;
            --dark3: #1A1A35;
            --card-bg: rgba(255,255,255,0.04);
            --card-border: rgba(255,255,255,0.08);
            --text: #F0EEFF;
            --text-muted: #9490B5;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --glass: rgba(255,255,255,0.05);
            --glass-border: rgba(255,255,255,0.1);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dark);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -40%;
            left: -20%;
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -40%;
            right: -20%;
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, rgba(236,72,153,0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        #root { min-height: 100vh; position: relative; z-index: 1; }

        /* NAVBAR */
        .navbar {
            background: rgba(13,13,26,0.85);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2.5rem;
            position: sticky;
            top: 0;
            z-index: 200;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            color: var(--text);
            letter-spacing: -0.5px;
        }
        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #7C3AED, #EC4899);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(124,58,237,0.4);
        }
        .logo span.highlight { 
            background: linear-gradient(135deg, #A78BFA, #F472B6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-menu { display: flex; gap: 0.3rem; list-style: none; align-items: center; }
        .nav-link {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            padding: 0.5rem 0.9rem;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .nav-link:hover { color: var(--text); background: var(--glass); }
        .nav-link.active { color: var(--text); background: rgba(124,58,237,0.2); }

        /* BUTTONS */
        .btn {
            padding: 0.65rem 1.4rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-primary {
            background: linear-gradient(135deg, #7C3AED, #EC4899);
            color: white;
            box-shadow: 0 4px 15px rgba(124,58,237,0.35);
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,58,237,0.5); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-secondary {
            background: var(--glass);
            color: var(--text);
            border: 1px solid var(--glass-border);
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.08); }

        /* HERO */
        .hero {
            padding: 6rem 2.5rem 4rem;
            text-align: center;
            position: relative;
        }
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(124,58,237,0.15);
            border: 1px solid rgba(124,58,237,0.3);
            color: #A78BFA;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
        }
        .hero h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(2.8rem, 7vw, 5.5rem);
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -2px;
            margin-bottom: 1.5rem;
        }
        .hero h1 .gradient-text {
            background: linear-gradient(135deg, #A78BFA 0%, #F472B6 50%, #FCD34D 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            color: var(--text-muted);
            font-size: 1.15rem;
            max-width: 580px;
            margin: 0 auto 2.5rem;
            line-height: 1.7;
        }
        .hero-buttons { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }

        /* CONTAINER */
        .container { max-width: 1280px; margin: 0 auto; padding: 2rem 2.5rem; }

        /* STATS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.2rem;
            margin: 2rem 0;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: transform 0.2s, border-color 0.2s;
        }
        .stat-card:hover { transform: translateY(-3px); border-color: rgba(124,58,237,0.3); }
        .stat-card-value {
            font-family: 'Syne', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #A78BFA, #F472B6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-card-label { color: var(--text-muted); font-size: 0.85rem; margin-top: 0.3rem; }

        /* CARDS */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 1.8rem;
            backdrop-filter: blur(10px);
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.2rem;
        }

        /* INFLUENCER CARD */
        .influencer-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.25s;
            text-align: center;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }
        .influencer-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #7C3AED, #EC4899);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .influencer-card:hover { transform: translateY(-5px); border-color: rgba(124,58,237,0.35); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .influencer-card:hover::before { opacity: 1; }
        .influencer-name { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 0.2rem; color: var(--text); }
        .influencer-handle { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 0.8rem; }
        .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; margin-top: 1rem; }
        .stat { text-align: center; }
        .stat-value { display: block; font-weight: 700; font-size: 1rem; color: var(--text); }
        .stat-label { display: block; font-size: 0.72rem; color: var(--text-muted); margin-top: 0.15rem; }

        /* BADGE */
        .badge {
            display: inline-block;
            padding: 0.25rem 0.7rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin: 0.15rem;
        }
        .badge-primary { background: rgba(124,58,237,0.2); color: #A78BFA; border: 1px solid rgba(124,58,237,0.3); }
        .badge-success { background: rgba(16,185,129,0.15); color: #10B981; }

        /* FORM */
        .form-group { margin-bottom: 1.2rem; }
        .form-label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: rgba(124,58,237,0.5);
            box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
        }
        .form-select option { background: var(--dark2); }
        .form-textarea { resize: vertical; min-height: 100px; }

        /* MODAL */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        .modal {
            background: var(--dark2);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 460px;
            position: relative;
            animation: slideUp 0.3s ease;
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
        }
        .modal-close {
            position: absolute; top: 1.2rem; right: 1.5rem;
            background: none; border: none; color: var(--text-muted);
            font-size: 1.3rem; cursor: pointer;
        }
        .modal-close:hover { color: var(--text); }
        .modal h2 {
            font-family: 'Syne', sans-serif;
            font-size: 1.8rem;
            background: linear-gradient(135deg, #A78BFA, #F472B6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.3rem;
        }
        .modal-tabs {
            display: flex; gap: 0;
            background: rgba(255,255,255,0.05);
            border-radius: 10px; padding: 4px;
            margin-bottom: 1.5rem;
        }
        .modal-tab {
            flex: 1; padding: 0.6rem; border: none; border-radius: 8px;
            cursor: pointer; font-weight: 600; background: none;
            color: var(--text-muted); transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .modal-tab.active { background: rgba(124,58,237,0.3); color: var(--text); }
        .alert-success { background: rgba(16,185,129,0.15); color: #10B981; border: 1px solid rgba(16,185,129,0.3); padding: 0.8rem 1rem; border-radius: 10px; margin-bottom: 1rem; font-weight: 600; }
        .alert-error { background: rgba(239,68,68,0.15); color: #EF4444; border: 1px solid rgba(239,68,68,0.3); padding: 0.8rem 1rem; border-radius: 10px; margin-bottom: 1rem; font-weight: 600; }

        /* LOADING */
        .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem; color: var(--text-muted); gap: 1rem; }
        .spinner { width: 36px; height: 36px; border: 3px solid rgba(124,58,237,0.2); border-top-color: #7C3AED; border-radius: 50%; animation: spin 0.8s linear infinite; }

        /* FILTERS */
        .filter-bar { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .filter-bar .form-select { flex: 1; min-width: 150px; }

        /* PRICING RESULT */
        .pricing-result { background: linear-gradient(135deg, #7C3AED, #EC4899); border-radius: 16px; padding: 2rem; text-align: center; margin-top: 1.5rem; color: white; }
        .price-display { font-family: 'Syne', sans-serif; font-size: 3rem; font-weight: 800; margin: 0.5rem 0; }

        /* PAGE TRANSITIONS */
        .page-enter { animation: fadeInUp 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--dark); }
        ::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.4); border-radius: 3px; }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .nav-menu { display: none; }
            .hero { padding: 3rem 1.5rem 2rem; }
            .container { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // API Configuration
        const API_BASE_URL = 'https://promobridge-backend0.onrender.com';
        
        // Main App Component
        function App() {
            const [currentPage, setCurrentPage] = useState('home');
            const [showAuth, setShowAuth] = useState(false);
            const [user, setUser] = useState(null);

            const handleLogout = () => {
                setUser(null);
                localStorage.removeItem('pb_token');
            };

            return (
                <div>
                    <Navbar currentPage={currentPage} setCurrentPage={setCurrentPage} user={user} setShowAuth={setShowAuth} handleLogout={handleLogout} />
                    {showAuth && <AuthModal setShowAuth={setShowAuth} setUser={setUser} />}
                    {currentPage === 'home' && <HomePage setCurrentPage={setCurrentPage} />}
                    {currentPage === 'search' && <SearchPage />}
                    {currentPage === 'campaign' && <CampaignPage />}
                    {currentPage === 'pricing' && <PricingPage />}
                    {currentPage === 'dashboard' && <DashboardPage />}
                </div>
            );
        }

        // Auth Modal
        function AuthModal({ setShowAuth, setUser }) {
            const [tab, setTab] = useState('login');
            const [form, setForm] = useState({ email: '', password: '', role: 'brand' });
            const [msg, setMsg] = useState(null);
            const [error, setError] = useState(null);
            const [loading, setLoading] = useState(false);

            const handleLogin = async () => {
                setLoading(true); setError(null); setMsg(null);
                try {
                    const res = await axios.post(`${API_BASE_URL}/auth/login`,
                        new URLSearchParams({ username: form.email, password: form.password }),
                        { headers: { 'Content-Type': 'application/x-www-form-urlencoded' }}
                    );
                    setUser({ email: res.data.email, role: res.data.role, token: res.data.access_token });
                    setShowAuth(false);
                } catch(e) {
                    setError(e.response?.data?.detail || 'Login failed. Check your credentials.');
                }
                setLoading(false);
            };

            const handleRegister = async () => {
                setLoading(true); setError(null); setMsg(null);
                try {
                    await axios.post(`${API_BASE_URL}/auth/register`, form);
                    setMsg('Account created! Please login now.');
                    setTab('login');
                } catch(e) {
                    setError(e.response?.data?.detail || 'Registration failed.');
                }
                setLoading(false);
            };

            return (
                <div className="modal-overlay" onClick={() => setShowAuth(false)}>
                    <div className="modal" onClick={e => e.stopPropagation()}>
                        <button className="modal-close" onClick={() => setShowAuth(false)}>✕</button>
                        <h2>🌉 Promobridge</h2>
                        <p style={{color: 'var(--gray)', marginBottom: '1.5rem'}}>Connect brands with influencers</p>

                        <div className="modal-tabs">
                            <button className={`modal-tab ${tab === 'login' ? 'active' : ''}`} onClick={() => setTab('login')}>Login</button>
                            <button className={`modal-tab ${tab === 'register' ? 'active' : ''}`} onClick={() => setTab('register')}>Register</button>
                        </div>

                        {msg && <div className="alert-success">{msg}</div>}
                        {error && <div className="alert-error">{error}</div>}

                        <div className="form-group">
                            <label className="form-label">Email</label>
                            <input type="email" className="form-input" placeholder="you@example.com"
                                value={form.email} onChange={e => setForm({...form, email: e.target.value})} />
                        </div>

                        <div className="form-group">
                            <label className="form-label">Password</label>
                            <input type="password" className="form-input" placeholder="••••••••"
                                value={form.password} onChange={e => setForm({...form, password: e.target.value})} />
                        </div>

                        {tab === 'register' && (
                            <div className="form-group">
                                <label className="form-label">I am a...</label>
                                <select className="form-select" value={form.role} onChange={e => setForm({...form, role: e.target.value})}>
                                    <option value="brand">Brand</option>
                                    <option value="influencer">Influencer</option>
                                </select>
                            </div>
                        )}

                        <button className="btn btn-primary" style={{width: '100%', padding: '1rem', marginTop: '0.5rem'}}
                            onClick={tab === 'login' ? handleLogin : handleRegister}
                            disabled={loading}>
                            {loading ? '⏳ Please wait...' : tab === 'login' ? '🔑 Login' : '🚀 Create Account'}
                        </button>
                    </div>
                </div>
            );
        }
        
        // Navbar Component
        function Navbar({ currentPage, setCurrentPage, user, setShowAuth, handleLogout }) {
            return (
                <nav className="navbar">
                    <div className="logo" onClick={() => setCurrentPage('home')}>
                        <div className="logo-icon">🌉</div>
                        <span>Promo<span className="highlight">bridge</span></span>
                    </div>
                    
                    <ul className="nav-menu">
                        <li><span className={`nav-link ${currentPage === 'home' ? 'active' : ''}`} onClick={() => setCurrentPage('home')}>Home</span></li>
                        <li><span className={`nav-link ${currentPage === 'search' ? 'active' : ''}`} onClick={() => setCurrentPage('search')}>Find Influencers</span></li>
                        <li><span className={`nav-link ${currentPage === 'campaign' ? 'active' : ''}`} onClick={() => setCurrentPage('campaign')}>Create Campaign</span></li>
                        <li><span className={`nav-link ${currentPage === 'pricing' ? 'active' : ''}`} onClick={() => setCurrentPage('pricing')}>Pricing</span></li>
                        <li><span className={`nav-link ${currentPage === 'dashboard' ? 'active' : ''}`} onClick={() => setCurrentPage('dashboard')}>Dashboard</span></li>
                    </ul>
                    
                    {user ? (
                        <div style={{display:'flex', alignItems:'center', gap:'1rem'}}>
                            <span style={{fontWeight:600, color:'var(--primary)'}}>👤 {user.email.split('@')[0]}</span>
                            <button className="btn btn-secondary" style={{padding:'0.5rem 1rem'}} onClick={handleLogout}>Logout</button>
                        </div>
                    ) : (
                        <button className="btn btn-primary" onClick={() => setShowAuth(true)}>Login / Register</button>
                    )}
                </nav>
            );
        }
        
        // Home Page
        function HomePage({ setCurrentPage }) {
            return (
                <div>
                    <section className="hero">
                        <div className="hero-badge">✦ India's #1 Influencer Marketing Platform</div>
                        <h1>Connect Brands with<br/><span className="gradient-text">Perfect Influencers</span></h1>
                        <p>AI-powered matching across Instagram, YouTube & TikTok. Real pricing, fraud detection, and data-driven campaigns — all in one place.</p>
                        <div className="hero-buttons">
                            <button 
                                className="btn btn-primary"
                                onClick={() => setCurrentPage('search')}
                            >
                                🔍 Find Influencers
                            </button>
                            <button 
                                className="btn btn-secondary"
                                onClick={() => setCurrentPage('campaign')}
                            >
                                🚀 Create Campaign
                            </button>
                            <button 
                                className="btn btn-secondary"
                                onClick={() => setCurrentPage('pricing')}
                            >
                                💰 Calculate Pricing
                            </button>
                        </div>
                    </section>
                    
                    <div className="container">
                        <StatsSection />
                    </div>
                </div>
            );
        }
        
        // Stats Section
        function StatsSection() {
            const [stats, setStats] = useState(null);
            
            useEffect(() => {
                axios.get(`${API_BASE_URL}/stats`)
                    .then(response => setStats(response.data))
                    .catch(error => console.error('Error fetching stats:', error));
            }, []);
            
            if (!stats) return <div className="loading"><div className="spinner"></div>Loading stats...</div>;
            
            return (
                <div className="stats-grid">
                    <div className="stat-card">
                        <div className="stat-card-value">{stats.total_influencers}+</div>
                        <div className="stat-card-label">Active Influencers</div>
                    </div>
                    <div className="stat-card">
                        <div className="stat-card-value">{stats.total_brands}+</div>
                        <div className="stat-card-label">Brands</div>
                    </div>
                    <div className="stat-card">
                        <div className="stat-card-value">{stats.total_campaigns}+</div>
                        <div className="stat-card-label">Campaigns</div>
                    </div>
                    <div className="stat-card">
                        <div className="stat-card-value">{stats.success_rate}%</div>
                        <div className="stat-card-label">Success Rate</div>
                    </div>
                </div>
            );
        }
        
        // Search Page
        function SearchPage() {
            const [influencers, setInfluencers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [filters, setFilters] = useState({
                platform: '',
                niche: '',
                minFollowers: ''
            });
            
            useEffect(() => {
                fetchInfluencers();
            }, []);
            
            const fetchInfluencers = () => {
                setLoading(true);
                const params = {};
                if (filters.platform) params.platform = filters.platform;
                if (filters.niche) params.niche = filters.niche;
                if (filters.minFollowers) params.min_followers = filters.minFollowers;

        // Real Indian Influencer Pricing Calculator
        function PricingPage() {
            const [inputs, setInputs] = useState({
                followers: 100000,
                engagement_rate: 3.5,
                platform: 'instagram',
                niche: 'Fashion'
            });
            const [result, setResult] = useState(null);

            // Real Indian influencer pricing rates (INR) based on industry standards
            // Source: Influencer Marketing Hub India 2024 data
            const PLATFORM_BASE_RATE = {
                instagram: { post: 1, story: 0.4, reel: 1.5, carousel: 1.2 },
                youtube:   { video: 2.5, short: 0.8, livestream: 1.8 },
                tiktok:    { video: 0.6, live: 0.5 },
            };

            const NICHE_MULTIPLIER = {
                'Fashion': 1.3, 'Tech': 1.5, 'Fitness': 1.2,
                'Food': 1.1, 'Travel': 1.4, 'Entertainment': 1.0,
            };

            const TIER_RATES = {
                nano:    { min: 1000,    max: 10000,    cpm: 150  },
                micro:   { min: 10000,   max: 100000,   cpm: 120  },
                mid:     { min: 100000,  max: 500000,   cpm: 100  },
                macro:   { min: 500000,  max: 1000000,  cpm: 80   },
                mega:    { min: 1000000, max: 10000000, cpm: 60   },
                celeb:   { min: 10000000,max: Infinity, cpm: 40   },
            };

            const getTier = (f) => {
                if (f < 10000) return { name: 'Nano', ...TIER_RATES.nano };
                if (f < 100000) return { name: 'Micro', ...TIER_RATES.micro };
                if (f < 500000) return { name: 'Mid-Tier', ...TIER_RATES.mid };
                if (f < 1000000) return { name: 'Macro', ...TIER_RATES.macro };
                if (f < 10000000) return { name: 'Mega', ...TIER_RATES.mega };
                return { name: 'Celebrity', ...TIER_RATES.celeb };
            };

            const getContentTypes = (platform) => {
                if (platform === 'instagram') return [
                    { key: 'post', label: '📸 Static Post', mult: 1.0 },
                    { key: 'reel', label: '🎬 Reel', mult: 1.5 },
                    { key: 'story', label: '⏱️ Story (24hr)', mult: 0.4 },
                    { key: 'carousel', label: '🖼️ Carousel Post', mult: 1.2 },
                ];
                if (platform === 'youtube') return [
                    { key: 'video', label: '🎥 Dedicated Video', mult: 2.5 },
                    { key: 'integration', label: '📌 Brand Integration', mult: 1.5 },
                    { key: 'short', label: '⚡ YouTube Short', mult: 0.8 },
                ];
                if (platform === 'tiktok') return [
                    { key: 'video', label: '🎵 TikTok Video', mult: 0.6 },
                    { key: 'duet', label: '🤝 Duet/Collab', mult: 0.5 },
                ];
                return [];
            };

            const calculateAll = () => {
                const f = Number(inputs.followers);
                const er = Number(inputs.engagement_rate);
                const tier = getTier(f);
                const nicheMult = NICHE_MULTIPLIER[inputs.niche] || 1.0;
                const engMult = 1 + (er - 3) * 0.05; // Base engagement is 3%
                const basePrice = (f / 1000) * tier.cpm * nicheMult * Math.max(0.7, engMult);
                const contentTypes = getContentTypes(inputs.platform);
                const breakdown = contentTypes.map(ct => ({
                    ...ct,
                    price: Math.round(basePrice * ct.mult),
                    min: Math.round(basePrice * ct.mult * 0.7),
                    max: Math.round(basePrice * ct.mult * 1.4),
                }));
                setResult({ tier, breakdown, basePrice: Math.round(basePrice), f, er, nicheMult });
            };

            const contentTypes = getContentTypes(inputs.platform);

            return (
                <div className="container">
                    <div style={{textAlign:'center', marginBottom:'2rem'}}>
                        <h2 style={{fontFamily:'Outfit', fontSize:'2.5rem', background:'linear-gradient(135deg, #6366f1, #ec4899)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent'}}>
                            💰 Influencer Pricing Calculator
                        </h2>
                        <p style={{color:'var(--gray)'}}>Real Indian market rates based on followers, engagement & niche</p>
                    </div>

                    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'2rem'}}>
                        {/* LEFT - Inputs */}
                        <div className="card">
                            <h3 style={{fontFamily:'Outfit', fontSize:'1.5rem', marginBottom:'1.5rem'}}>📊 Influencer Details</h3>

                            <div className="form-group">
                                <label className="form-label">Followers Count</label>
                                <input type="number" className="form-input"
                                    value={inputs.followers}
                                    onChange={e => setInputs({...inputs, followers: e.target.value})}
                                    placeholder="e.g. 100000" />
                                <small style={{color:'var(--gray)'}}>Current: {formatNumber(Number(inputs.followers))} followers</small>
                            </div>

                            <div className="form-group">
                                <label className="form-label">Engagement Rate (%)</label>
                                <input type="number" className="form-input" step="0.1" min="0" max="100"
                                    value={inputs.engagement_rate}
                                    onChange={e => setInputs({...inputs, engagement_rate: e.target.value})} />
                                <small style={{color:'var(--gray)'}}>Average Indian: 3-6% | Good: 6%+</small>
                            </div>

                            <div className="form-group">
                                <label className="form-label">Platform</label>
                                <select className="form-select" value={inputs.platform}
                                    onChange={e => setInputs({...inputs, platform: e.target.value})}>
                                    <option value="instagram">📸 Instagram</option>
                                    <option value="youtube">▶️ YouTube</option>
                                    <option value="tiktok">🎵 TikTok</option>
                                </select>
                            </div>

                            <div className="form-group">
                                <label className="form-label">Niche / Category</label>
                                <select className="form-select" value={inputs.niche}
                                    onChange={e => setInputs({...inputs, niche: e.target.value})}>
                                    <option value="Fashion">👗 Fashion</option>
                                    <option value="Tech">💻 Tech</option>
                                    <option value="Fitness">💪 Fitness</option>
                                    <option value="Food">🍔 Food</option>
                                    <option value="Travel">✈️ Travel</option>
                                    <option value="Entertainment">🎭 Entertainment</option>
                                </select>
                            </div>

                            <button className="btn btn-primary" style={{width:'100%', padding:'1.2rem', fontSize:'1.1rem'}}
                                onClick={calculateAll}>
                                🧮 Calculate Pricing
                            </button>
                        </div>

                        {/* RIGHT - Results */}
                        <div>
                            {!result ? (
                                <div className="card" style={{textAlign:'center', padding:'3rem'}}>
                                    <div style={{fontSize:'4rem', marginBottom:'1rem'}}>💡</div>

                                </div>

                                                <div style={{fontSize:'0.9rem', opacity:0.9}}>Influencer Tier</div>

                                                <div style={{fontSize:'0.9rem', opacity:0.9}}>{formatNumber(result.f)} followers • {result.er}% engagement</div>
                                            </div>
                                            <div style={{textAlign:'right'}}>
                                                <div style={{fontSize:'0.9rem', opacity:0.9}}>Base Rate / 1K followers</div>
                                                <div style={{fontSize:'1.8rem', fontWeight:800}}>₹{result.tier.cpm}</div>

                                        </div>
                                    </div>
                                </>
                            )}

                    </div>
                </div>
            );
        }

                            <p style={{fontSize:'1.2rem', color:'var(--gray)'}}>No campaigns yet. Create one!</p>
                        </div>
                    ) : (
                        <div className="card-grid">
                            {campaigns.map(c => (
                                <div key={c.campaign_id} className="card">
                                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'1rem'}}>
                                        <span className="badge badge-success" style={{background: `${nicheColors2[c.niche] || '#888'}22`, color: nicheColors2[c.niche] || '#888'}}>{c.niche || 'General'}</span>
                                        <span className="badge" style={{background:'#d1fae5', color:'#065f46'}}>{c.status || 'draft'}</span>
                                    </div>
                                    <h3 style={{fontFamily:'Outfit', fontSize:'1.2rem', marginBottom:'0.5rem'}}>{c.title}</h3>
                                    <p style={{color:'var(--gray)', fontSize:'0.9rem', marginBottom:'1rem'}}>{c.description ? c.description.slice(0, 80) + '...' : ''}</p>
                                    <div style={{display:'flex', justifyContent:'space-between', marginBottom:'1rem'}}>
                                        <div>
                                            <div style={{fontWeight:700, color:'var(--success)', fontSize:'1.1rem'}}>{formatINR(c.budget)}</div>
                                            <div style={{fontSize:'0.8rem', color:'var(--gray)'}}>Budget</div>
                                        </div>
                                        <div>
                                            <div style={{fontWeight:700, color:'var(--primary)', fontSize:'1.1rem'}}>{c.platform || 'All'}</div>
                                            <div style={{fontSize:'0.8rem', color:'var(--gray)'}}>Platform</div>
                                        </div>
                                        <div>
                                            <div style={{fontWeight:700, color:'var(--warning)', fontSize:'1.1rem'}}>{c.min_followers ? formatIndian(c.min_followers) : 'Any'}</div>
                                            <div style={{fontSize:'0.8rem', color:'var(--gray)'}}>Min Followers</div>
                                        </div>
                                    </div>
                                    <button className="btn btn-primary" style={{width:'100%'}}
                                        onClick={() => alert(`🎯 Finding influencers for:
${c.title}

Budget: ${formatINR(c.budget)}
Platform: ${c.platform}
Niche: ${c.niche}`)}>
                                        🤖 Find Matching Influencers
                                    </button>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }
        
        // Indian currency formatter
        function formatINR(amount) {
            if (!amount || amount === 0) return '₹0';
            if (amount >= 10000000) return `₹${(amount / 10000000).toFixed(1)} Cr`;
            if (amount >= 100000) return `₹${(amount / 100000).toFixed(1)} L`;
            if (amount >= 1000) return `₹${(amount / 1000).toFixed(1)}K`;
            return `₹${amount.toLocaleString('en-IN')}`;
        }

        // Indian follower formatter (for min_followers in campaigns)
        function formatIndian(num) {
            if (!num || num === 0) return '0';
            if (num >= 10000000) return `${(num / 10000000).toFixed(1)} Cr`;
            if (num >= 100000) return `${(num / 100000).toFixed(1)} L`;
            if (num >= 1000) return `${(num / 1000).toFixed(1)}K`;
            return num.toString();
        }

        // Followers formatter - millions format
        function formatNumber(num) {
            if (!num || num === 0) return '0';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }
        
        function getMockInfluencers() {
            return [
                { full_name: "Virat Kohli", handle: "virat.kohli", platform: "Instagram", niche: "Fitness", followers_count: 270000000, engagement_rate: 4.2 },
                { full_name: "Bhuvan Bam", handle: "bhuvan.bam22", platform: "YouTube", niche: "Entertainment", followers_count: 26000000, engagement_rate: 5.8 },
                { full_name: "Kusha Kapila", handle: "kushakapila", platform: "Instagram", niche: "Fashion", followers_count: 3500000, engagement_rate: 6.2 },
                { full_name: "Ranveer Allahbadia", handle: "beerbiceps", platform: "YouTube", niche: "Fitness", followers_count: 6000000, engagement_rate: 4.5 },
                { full_name: "Sejal Kumar", handle: "sejalkumar", platform: "YouTube", niche: "Fashion", followers_count: 1500000, engagement_rate: 7.1 },
                { full_name: "Tech Burner", handle: "techburner", platform: "YouTube", niche: "Tech", followers_count: 10000000, engagement_rate: 5.3 }
            ];
        }
        
        // Render App
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
