<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promobridge — India's Influencer Marketing Platform</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07070F;
  --bg2:#0E0E1C;
  --bg3:#141428;
  --card:#12121F;
  --card2:#1A1A2E;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(124,58,237,0.25);
  --p1:#7C3AED;
  --p2:#A855F7;
  --p3:#C084FC;
  --acc:#F472B6;
  --acc2:#FB923C;
  --gold:#FBBF24;
  --green:#10B981;
  --text:#F8F8FF;
  --text2:#A0A0C0;
  --text3:#6B6B8A;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* AMBIENT GLOW */
body::before{content:'';position:fixed;top:-30vh;left:-20vw;width:70vw;height:70vh;background:radial-gradient(ellipse,rgba(124,58,237,0.12) 0%,transparent 65%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-30vh;right:-20vw;width:60vw;height:60vh;background:radial-gradient(ellipse,rgba(244,114,182,0.08) 0%,transparent 65%);pointer-events:none;z-index:0}

#root{position:relative;z-index:1}

/* NAV */
nav{position:sticky;top:0;z-index:500;background:rgba(7,7,15,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 2.5rem;height:64px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:0.5rem;color:var(--text)}
.logo-box{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--p1),var(--acc));display:flex;align-items:center;justify-content:center;font-size:1rem;box-shadow:0 4px 14px rgba(124,58,237,0.45)}
.logo em{font-style:normal;background:linear-gradient(135deg,var(--p3),var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-links{display:flex;gap:0.2rem;list-style:none}
.nav-links li span{padding:0.45rem 0.9rem;border-radius:8px;cursor:pointer;font-size:0.875rem;font-weight:500;color:var(--text2);transition:all 0.18s;display:block}
.nav-links li span:hover{color:var(--text);background:rgba(255,255,255,0.06)}
.nav-links li span.active{color:var(--text);background:rgba(124,58,237,0.18);border:1px solid var(--border2)}
.nav-right{display:flex;align-items:center;gap:0.8rem}
.user-chip{display:flex;align-items:center;gap:0.5rem;padding:0.4rem 1rem 0.4rem 0.6rem;border-radius:20px;background:rgba(124,58,237,0.15);border:1px solid var(--border2);font-size:0.85rem;font-weight:600;color:var(--p3);cursor:pointer}

/* BUTTONS */
.btn{padding:0.6rem 1.3rem;border-radius:10px;font-weight:600;font-size:0.875rem;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all 0.18s;display:inline-flex;align-items:center;gap:0.4rem}
.btn-primary{background:linear-gradient(135deg,var(--p1),#9333EA);color:#fff;box-shadow:0 4px 14px rgba(124,58,237,0.35)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(124,58,237,0.5)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border);padding:0.6rem 1.3rem}
.btn-outline:hover{border-color:var(--border2);background:rgba(124,58,237,0.08)}
.btn-ghost{background:rgba(255,255,255,0.05);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:rgba(255,255,255,0.09);color:var(--text)}
.btn-sm{padding:0.4rem 0.9rem;font-size:0.8rem;border-radius:8px}

/* HERO */
.hero{padding:5.5rem 2.5rem 3.5rem;text-align:center;position:relative}
.hero-pill{display:inline-flex;align-items:center;gap:0.5rem;background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.28);color:var(--p3);padding:0.35rem 1rem;border-radius:20px;font-size:0.8rem;font-weight:600;margin-bottom:1.8rem;letter-spacing:0.3px}
.hero-pill span{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(3rem,7vw,5.8rem);font-weight:800;line-height:1.02;letter-spacing:-2.5px;margin-bottom:1.3rem}
.hero h1 .g{background:linear-gradient(135deg,#A78BFA 0%,#F472B6 45%,#FB923C 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{color:var(--text2);font-size:1.1rem;max-width:560px;margin:0 auto 2.5rem;line-height:1.75}
.hero-btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}

/* LAYOUT */
.container{max-width:1280px;margin:0 auto;padding:2rem 2.5rem}
.section-title{font-family:'Syne',sans-serif;font-size:1.75rem;font-weight:700;margin-bottom:0.4rem}
.section-sub{color:var(--text2);font-size:0.9rem;margin-bottom:1.8rem}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin:2rem 0}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.4rem 1.2rem;text-align:center;transition:all 0.2s;position:relative;overflow:hidden}
.stat-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--p1),var(--acc));opacity:0;transition:opacity 0.2s}
.stat-box:hover{border-color:var(--border2);transform:translateY(-2px)}
.stat-box:hover::before{opacity:1}
.stat-num{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--p3),var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-lbl{color:var(--text2);font-size:0.8rem;margin-top:0.25rem;font-weight:500}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.6rem}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:1rem}

/* INFLUENCER CARD */
.inf-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.4rem;cursor:pointer;transition:all 0.22s;text-align:center;position:relative;overflow:hidden}
.inf-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(124,58,237,0.04),rgba(244,114,182,0.04));opacity:0;transition:opacity 0.22s}
.inf-card:hover{border-color:rgba(124,58,237,0.4);transform:translateY(-4px);box-shadow:0 20px 40px rgba(0,0,0,0.4)}
.inf-card:hover::after{opacity:1}
.inf-card .top-bar{position:absolute;top:0;left:0;right:0;height:2.5px;background:linear-gradient(90deg,var(--p1),var(--acc));opacity:0;transition:opacity 0.22s}
.inf-card:hover .top-bar{opacity:1}
.avatar-wrap{position:relative;width:82px;height:82px;margin:0 auto 0.9rem}
.avatar-img{width:82px;height:82px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.1)}
.avatar-platform{position:absolute;bottom:0;right:0;width:22px;height:22px;border-radius:50%;border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:0.6rem}
.inf-name{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--text);margin-bottom:0.15rem}
.inf-handle{color:var(--text3);font-size:0.8rem;margin-bottom:0.7rem}
.tags{display:flex;gap:0.4rem;justify-content:center;flex-wrap:wrap;margin-bottom:0.7rem}
.tag{padding:0.2rem 0.6rem;border-radius:6px;font-size:0.72rem;font-weight:600}
.match-bar{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);border-radius:8px;padding:0.35rem 0.7rem;font-size:0.78rem;color:#10B981;margin-bottom:0.8rem;font-weight:600}
.inf-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.4rem;border-top:1px solid var(--border);padding-top:0.8rem;margin-top:0.3rem}
.inf-stat-val{display:block;font-weight:700;font-size:0.9rem;color:var(--text)}
.inf-stat-lbl{display:block;font-size:0.68rem;color:var(--text3);margin-top:0.1rem}

/* BADGE */
.badge{display:inline-block;padding:0.22rem 0.65rem;border-radius:6px;font-size:0.72rem;font-weight:600}
.badge-p{background:rgba(124,58,237,0.18);color:var(--p3);border:1px solid rgba(124,58,237,0.25)}
.badge-g{background:rgba(16,185,129,0.15);color:#10B981;border:1px solid rgba(16,185,129,0.2)}
.badge-o{background:rgba(251,146,60,0.15);color:#FB923C;border:1px solid rgba(251,146,60,0.2)}

/* FORM */
.form-group{margin-bottom:1.1rem}
.form-label{display:block;font-size:0.75rem;font-weight:600;color:var(--text2);margin-bottom:0.45rem;text-transform:uppercase;letter-spacing:0.6px}
.form-input,.form-select,.form-textarea{width:100%;padding:0.8rem 1rem;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Inter',sans-serif;font-size:0.9rem;transition:all 0.18s}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:rgba(124,58,237,0.5);box-shadow:0 0 0 3px rgba(124,58,237,0.1)}
.form-select option{background:var(--bg2);color:var(--text)}
.form-textarea{resize:vertical;min-height:90px}
small.hint{color:var(--text3);font-size:0.78rem;margin-top:0.3rem;display:block}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(10px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;animation:fadeIn 0.2s}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:22px;padding:2.2rem;width:100%;max-width:450px;position:relative;animation:slideUp 0.28s ease;box-shadow:0 40px 80px rgba(0,0,0,0.6);max-height:90vh;overflow-y:auto}
.modal-close{position:absolute;top:1.1rem;right:1.3rem;background:rgba(255,255,255,0.06);border:none;color:var(--text2);font-size:1rem;cursor:pointer;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{color:var(--text);background:rgba(255,255,255,0.1)}
.tabs{display:flex;gap:0;background:rgba(255,255,255,0.04);border-radius:10px;padding:3px;margin-bottom:1.4rem}
.tab{flex:1;padding:0.55rem;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:0.85rem;background:none;color:var(--text2);transition:all 0.18s;font-family:'Inter',sans-serif}
.tab.active{background:rgba(124,58,237,0.28);color:var(--text)}
.alert-ok{background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.25);color:#10B981;padding:0.7rem 1rem;border-radius:9px;margin-bottom:1rem;font-size:0.875rem;font-weight:600}
.alert-err{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.25);color:#F87171;padding:0.7rem 1rem;border-radius:9px;margin-bottom:1rem;font-size:0.875rem;font-weight:600}

/* LOADER */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem;color:var(--text3);gap:1rem}
.spin{width:34px;height:34px;border:3px solid rgba(124,58,237,0.2);border-top-color:var(--p1);border-radius:50%;animation:spin 0.75s linear infinite}

/* FILTER BAR */
.filters{display:flex;gap:0.8rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center}
.filters .form-select{flex:1;min-width:140px;max-width:200px}

/* PRICING CARD */
.price-result-card{background:linear-gradient(135deg,rgba(124,58,237,0.2),rgba(244,114,182,0.15));border:1px solid rgba(124,58,237,0.3);border-radius:16px;padding:1.5rem;margin-bottom:1rem}
.price-big{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;color:var(--text)}
.content-row{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:1rem 1.2rem;margin-bottom:0.6rem;display:flex;justify-content:space-between;align-items:center;transition:border-color 0.18s}
.content-row:hover{border-color:var(--border2)}
.content-row-label{font-weight:600;font-size:0.9rem;color:var(--text)}
.content-row-sub{font-size:0.75rem;color:var(--text3);margin-top:0.15rem}
.content-row-price{font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:800;color:var(--p3)}
.content-row-range{font-size:0.72rem;color:var(--text3);text-align:right;margin-top:0.1rem}

/* CAMPAIGN CARD */
.camp-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.4rem;transition:all 0.2s}
.camp-card:hover{border-color:var(--border2);transform:translateY(-2px)}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:rgba(124,58,237,0.35);border-radius:3px}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeInUp 0.4s ease both}

@media(max-width:768px){
  .stats-row{grid-template-columns:1fr 1fr}
  nav{padding:0 1rem}
  .nav-links{display:none}
  .hero{padding:3rem 1.5rem 2rem}
  .container{padding:1.5rem}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback} = React;
const API = 'https://promobridge-backend0.onrender.com';

// ── TOAST SYSTEM ───────────────────────────────────
function useToast(){
  const[toasts,setToasts]=useState([]);
  const show=(msg,type='success')=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);
  };
  return{toasts,show};
}

function ToastContainer({toasts}){
  return(
    <div style={{position:'fixed',top:'80px',right:'20px',zIndex:9999,display:'flex',flexDirection:'column',gap:'0.6rem',pointerEvents:'none'}}>
      {toasts.map(t=>(
        <div key={t.id} style={{
          background: t.type==='success'?'linear-gradient(135deg,rgba(16,185,129,0.95),rgba(5,150,105,0.95))':'linear-gradient(135deg,rgba(239,68,68,0.95),rgba(220,38,38,0.95))',
          color:'#fff',
          padding:'0.85rem 1.3rem',
          borderRadius:'14px',
          fontSize:'0.9rem',
          fontWeight:600,
          boxShadow:'0 8px 30px rgba(0,0,0,0.4)',
          backdropFilter:'blur(10px)',
          border:'1px solid rgba(255,255,255,0.15)',
          animation:'slideInRight 0.3s ease',
          display:'flex',
          alignItems:'center',
          gap:'0.6rem',
          minWidth:'260px',
          maxWidth:'380px',
          pointerEvents:'all',
        }}>
          <span style={{fontSize:'1.2rem'}}>{t.type==='success'?'✅':'❌'}</span>
          {t.msg}
        </div>
      ))}
    </div>
  );
}

// ── UTILS ──────────────────────────────────────────
function fNum(n){if(!n||n===0)return'0';if(n>=10000000)return(n/10000000).toFixed(1)+'Cr';if(n>=1000000)return(n/1000000).toFixed(1)+'M';if(n>=100000)return(n/100000).toFixed(0)+'L';if(n>=1000)return(n/1000).toFixed(1)+'K';return n.toString()}
function fINR(a){if(!a||a===0)return'₹0';if(a>=10000000)return`₹${(a/10000000).toFixed(1)} Cr`;if(a>=100000)return`₹${(a/100000).toFixed(1)} L`;if(a>=1000)return`₹${(a/1000).toFixed(0)}K`;return`₹${a}`}

const PLAT_COLOR={instagram:'#E1306C',youtube:'#FF0000',tiktok:'#000',twitter:'#1DA1F2'};
const PLAT_ICON={instagram:'📸',youtube:'▶️',tiktok:'🎵',twitter:'🐦'};
const NICHE_COLOR={Fitness:'#10B981',Fashion:'#F472B6',Tech:'#818CF8',Entertainment:'#FBBF24',Food:'#FB923C',Travel:'#22D3EE'};

function avatar(name){return`https://api.dicebear.com/7.x/notionists/svg?seed=${encodeURIComponent(name)}&backgroundColor=b6e3f4,c0aede,d1d4f9,ffd5dc&backgroundType=gradientLinear`}
function profileLink(handle,platform){const h=handle.replace('.pb','').replace(/\s/g,'');if(platform==='instagram')return`https://instagram.com/${h}`;if(platform==='youtube')return`https://youtube.com/@${h}`;if(platform==='tiktok')return`https://tiktok.com/@${h}`;return'#'}

// ── APP ────────────────────────────────────────────
function App(){
  const[page,setPage]=useState('home');
  const[showAuth,setShowAuth]=useState(false);
  const[user,setUser]=useState(null);
  const{toasts,show:showToast}=useToast();
  return(
    <div>
      <Navbar page={page} setPage={setPage} user={user} setShowAuth={setShowAuth} onLogout={()=>setUser(null)}/>
      <ToastContainer toasts={toasts}/>
      {showAuth&&<AuthModal onClose={()=>setShowAuth(false)} onLogin={setUser}/>}
      {page==='home'&&<HomePage setPage={setPage}/>}
      {page==='search'&&<SearchPage showToast={showToast}/>}
      {page==='campaign'&&<CampaignPage showToast={showToast}/>}
      {page==='pricing'&&<PricingPage/>}
      {page==='dashboard'&&<DashboardPage showToast={showToast}/>}
    </div>
  );
}

// ── NAVBAR ─────────────────────────────────────────
function Navbar({page,setPage,user,setShowAuth,onLogout}){
  const links=[['home','Home'],['search','Find Influencers'],['campaign','Create Campaign'],['pricing','Pricing'],['dashboard','Dashboard']];
  return(
    <nav>
      <div className="logo" onClick={()=>setPage('home')}>
        <div className="logo-box">🌉</div>
        Promo<em>bridge</em>
      </div>
      <ul className="nav-links">
        {links.map(([k,l])=><li key={k}><span className={page===k?'active':''} onClick={()=>setPage(k)}>{l}</span></li>)}
      </ul>
      <div className="nav-right">
        {user?(
          <>
            <div className="user-chip">👤 {user.email.split('@')[0]}</div>
            <button className="btn btn-ghost btn-sm" onClick={onLogout}>Logout</button>
          </>
        ):(
          <button className="btn btn-primary" onClick={()=>setShowAuth(true)}>Login / Register</button>
        )}
      </div>
    </nav>
  );
}

// ── AUTH MODAL ─────────────────────────────────────
function AuthModal({onClose,onLogin}){
  const[tab,setTab]=useState('login');
  const[form,setForm]=useState({email:'',password:'',role:'brand'});
  const[msg,setMsg]=useState('');
  const[err,setErr]=useState('');
  const[loading,setLoading]=useState(false);

  const doLogin=async()=>{
    setLoading(true);setErr('');setMsg('');
    try{
      const r=await axios.post(`${API}/auth/login`,new URLSearchParams({username:form.email,password:form.password}),{headers:{'Content-Type':'application/x-www-form-urlencoded'}});
      onLogin({email:r.data.email,role:r.data.role,token:r.data.access_token});
      onClose();
    }catch(e){setErr(e.response?.data?.detail||'Login failed')}
    setLoading(false);
  };
  const doRegister=async()=>{
    setLoading(true);setErr('');setMsg('');
    try{
      await axios.post(`${API}/auth/register`,form);
      setMsg('Account created! Please login.');setTab('login');
    }catch(e){setErr(e.response?.data?.detail||'Registration failed')}
    setLoading(false);
  };

  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}>✕</button>
        <div style={{marginBottom:'1.2rem'}}>
          <div style={{fontFamily:'Syne',fontSize:'1.6rem',fontWeight:800,background:'linear-gradient(135deg,#A78BFA,#F472B6)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>Welcome Back 👋</div>
          <div style={{color:'var(--text3)',fontSize:'0.85rem',marginTop:'0.2rem'}}>Connect brands with influencers</div>
        </div>
        <div className="tabs">
          <button className={`tab${tab==='login'?' active':''}`} onClick={()=>setTab('login')}>Login</button>
          <button className={`tab${tab==='register'?' active':''}`} onClick={()=>setTab('register')}>Register</button>
        </div>
        {msg&&<div className="alert-ok">{msg}</div>}
        {err&&<div className="alert-err">{err}</div>}
        <div className="form-group"><label className="form-label">Email</label><input type="email" className="form-input" placeholder="you@example.com" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/></div>

// ── PRICING PAGE ───────────────────────────────────
function PricingPage(){
  const[inp,setInp]=useState({followers:100000,er:3.5,platform:'instagram',niche:'Fashion'});
  const[result,setResult]=useState(null);

  const TIER_CPM={nano:150,micro:120,mid:100,macro:80,mega:60,celeb:40};
  const NICHE_MULT={Fashion:1.3,Tech:1.5,Fitness:1.2,Food:1.1,Travel:1.4,Entertainment:1.0};
  const CONTENT={
    instagram:[{k:'post',l:'📸 Static Post',s:'Brand integration in feed',m:1.0},{k:'reel',l:'🎬 Reel',s:'Short-form video content',m:1.5},{k:'story',l:'⏱️ Story (24hr)',s:'Ephemeral story post',m:0.4},{k:'carousel',l:'🖼️ Carousel Post',s:'Multi-image swipe post',m:1.2}],
    youtube:[{k:'video',l:'🎥 Dedicated Video',s:'Full video about brand',m:2.5},{k:'integration',l:'📌 Brand Integration',s:'Mention in existing video',m:1.5},{k:'short',l:'⚡ YouTube Short',s:'60-sec short content',m:0.8}],
    tiktok:[{k:'video',l:'🎵 TikTok Video',s:'Native TikTok content',m:0.6},{k:'duet',l:'🤝 Duet / Collab',s:'Duet with brand account',m:0.5}],
  };

  const getTier=f=>{
    if(f<10000)return{name:'Nano',cpm:TIER_CPM.nano};
    if(f<100000)return{name:'Micro',cpm:TIER_CPM.micro};
    if(f<500000)return{name:'Mid-Tier',cpm:TIER_CPM.mid};
    if(f<1000000)return{name:'Macro',cpm:TIER_CPM.macro};
    if(f<10000000)return{name:'Mega',cpm:TIER_CPM.mega};
    return{name:'Celebrity',cpm:TIER_CPM.celeb};
  };

  const calc=()=>{
    const f=Number(inp.followers),er=Number(inp.er);
    const tier=getTier(f);
    const nm=NICHE_MULT[inp.niche]||1.0;
    const em=1+(er-3)*0.05;
    const base=(f/1000)*tier.cpm*nm*Math.max(0.7,em);
    const contents=(CONTENT[inp.platform]||[]).map(c=>({
      ...c,
      price:Math.round(base*c.m),
      min:Math.round(base*c.m*0.7),
      max:Math.round(base*c.m*1.4),
    }));
    setResult({tier,contents,base:Math.round(base),nm,f,er});
  };

  const tierColors={Nano:'#10B981',Micro:'#22D3EE',['Mid-Tier']:'#818CF8',Macro:'#F472B6',Mega:'#FB923C',Celebrity:'#FBBF24'};

  return(
    <div className="container anim">
      <div style={{marginBottom:'1.5rem'}}>
        <div className="section-title">💰 Pricing Calculator</div>
        <div className="section-sub">Real Indian influencer market rates — by tier, platform, niche & content type</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1.3fr',gap:'2rem',alignItems:'start'}}>

        {/* LEFT */}
        <div className="card">
          <div style={{fontFamily:'Syne',fontSize:'1rem',fontWeight:700,marginBottom:'1.2rem',color:'var(--text2)'}}>INFLUENCER DETAILS</div>
          <div className="form-group">
            <label className="form-label">Followers Count</label>
            <input type="number" className="form-input" value={inp.followers} onChange={e=>setInp({...inp,followers:e.target.value})}/>
            <small className="hint">Currently: {fNum(Number(inp.followers))} followers</small>
          </div>
          <div className="form-group">
            <label className="form-label">Engagement Rate (%)</label>
            <input type="number" className="form-input" step="0.1" value={inp.er} onChange={e=>setInp({...inp,er:e.target.value})}/>
            <small className="hint">India avg: 3–6% · Excellent: 6%+</small>
          </div>
          <div className="form-group">
            <label className="form-label">Platform</label>
            <select className="form-select" value={inp.platform} onChange={e=>setInp({...inp,platform:e.target.value})}>
              <option value="instagram">📸 Instagram</option>
              <option value="youtube">▶️ YouTube</option>
              <option value="tiktok">🎵 TikTok</option>
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">Niche / Category</label>
            <select className="form-select" value={inp.niche} onChange={e=>setInp({...inp,niche:e.target.value})}>
              {['Fashion','Tech','Fitness','Food','Travel','Entertainment'].map(n=><option key={n}>{n}</option>)}
            </select>
          </div>
          <button className="btn btn-primary" style={{width:'100%',padding:'0.9rem',justifyContent:'center'}} onClick={calc}>🧮 Calculate Pricing</button>

          {/* TIER GUIDE */}
          <div style={{marginTop:'1.5rem',padding:'1rem',background:'var(--bg3)',borderRadius:12,border:'1px solid var(--border)'}}>
            <div style={{fontSize:'0.75rem',fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'0.7rem'}}>Influencer Tiers</div>
            {[['Nano','1K–10K'],['Micro','10K–100K'],['Mid-Tier','100K–500K'],['Macro','500K–1M'],['Mega','1M–10M'],['Celebrity','10M+']].map(([t,r])=>(
              <div key={t} style={{display:'flex',justifyContent:'space-between',padding:'0.3rem 0',borderBottom:'1px solid var(--border)'}}>
                <span style={{fontSize:'0.8rem',fontWeight:600,color:tierColors[t]||'var(--p3)'}}>{t}</span>
                <span style={{fontSize:'0.8rem',color:'var(--text3)'}}>{r}</span>
              </div>
            ))}
          </div>
        </div>

        {/* RIGHT */}
        <div>
          {!result?(
            <div className="card" style={{textAlign:'center',padding:'3rem',border:'1px dashed rgba(124,58,237,0.25)'}}>
              <div style={{fontSize:'3.5rem',marginBottom:'1rem'}}>💡</div>
              <div style={{fontFamily:'Syne',fontSize:'1.1rem',fontWeight:700,marginBottom:'0.5rem'}}>Ready to Calculate</div>
              <div style={{color:'var(--text3)',fontSize:'0.875rem'}}>Fill in the details and hit Calculate to see the full pricing breakdown</div>
            </div>
          ):(
            <>
              {/* TIER CARD */}
              <div style={{background:`linear-gradient(135deg,${tierColors[result.tier.name]||'#7C3AED'}22,${tierColors[result.tier.name]||'#7C3AED'}10)`,border:`1px solid ${tierColors[result.tier.name]||'#7C3AED'}40`,borderRadius:16,padding:'1.3rem',marginBottom:'1rem',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontSize:'0.75rem',fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'0.5px'}}>Tier</div>
                  <div style={{fontFamily:'Syne',fontSize:'1.8rem',fontWeight:800,color:tierColors[result.tier.name]||'var(--p3)'}}>{result.tier.name}</div>
                  <div style={{color:'var(--text2)',fontSize:'0.8rem'}}>{fNum(result.f)} followers · {result.er}% engagement</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:'0.72rem',color:'var(--text3)'}}>Base CPM</div>
                  <div style={{fontFamily:'Syne',fontSize:'2rem',fontWeight:800,color:tierColors[result.tier.name]||'var(--p3)'}}>₹{result.tier.cpm}</div>
                  <div style={{fontSize:'0.72rem',color:'var(--text3)'}}>per 1K followers</div>
                </div>
              </div>

              {/* CONTENT TYPE BREAKDOWN */}
              <div className="card">
                <div style={{fontFamily:'Syne',fontSize:'1rem',fontWeight:700,marginBottom:'1rem'}}>Pricing by Content Type</div>
                {result.contents.map(c=>(
                  <div key={c.k} className="content-row">
                    <div>
                      <div className="content-row-label">{c.l}</div>
                      <div className="content-row-sub">{c.s}</div>
                    </div>
                    <div style={{textAlign:'right',flexShrink:0,marginLeft:'1rem'}}>
                      <div className="content-row-price">{fINR(c.price)}</div>
                      <div className="content-row-range">{fINR(c.min)} – {fINR(c.max)}</div>
                    </div>
                  </div>
                ))}
                <div style={{marginTop:'1rem',background:'rgba(124,58,237,0.08)',border:'1px solid rgba(124,58,237,0.2)',borderRadius:10,padding:'0.8rem',fontSize:'0.8rem',color:'var(--p3)'}}>
                  <strong>✦ {inp.niche} premium:</strong> {Math.round((result.nm-1)*100)}% higher rates · <strong>Engagement boost:</strong> {result.er>3?'+'+(((result.er-3)*0.05)*100).toFixed(0)+'%':'standard'}
                </div>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ── DASHBOARD ──────────────────────────────────────
function DashboardPage({showToast}){
  const[campaigns,setCampaigns]=useState([]);
  const[loading,setLoading]=useState(true);
  useEffect(()=>{
    axios.get(`${API}/campaigns`,{params:{limit:12}})
      .then(r=>{setCampaigns(r.data);setLoading(false)})
      .catch(()=>setLoading(false));
  },[]);

  return(
    <div className="container anim">
      <Stats/>
      <div style={{marginBottom:'1.2rem',marginTop:'1rem'}}>
        <div className="section-title">📢 Active Campaigns</div>
        <div className="section-sub">Live campaigns from partner brands seeking influencer collaborations</div>
      </div>
      {loading?<div className="loader"><div className="spin"></div></div>:campaigns.length===0?(
        <div className="card" style={{textAlign:'center',padding:'3rem',border:'1px dashed rgba(124,58,237,0.2)'}}>
          <div style={{fontSize:'3rem',marginBottom:'1rem'}}>📭</div>
          <div style={{color:'var(--text2)'}}>No campaigns yet. Create one to get started!</div>
        </div>
      ):(
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:'1rem'}}>
          {campaigns.map(c=>{
            const nc=NICHE_COLOR[c.niche]||'#A78BFA';
            return(
              <div key={c.campaign_id} className="camp-card">
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'0.8rem'}}>
                  <span className="badge" style={{background:`${nc}18`,color:nc,border:`1px solid ${nc}30`}}>{c.niche||'General'}</span>
                  <span className="badge badge-g" style={{fontSize:'0.7rem'}}>{c.status||'active'}</span>
                </div>
                <div style={{fontFamily:'Syne',fontSize:'1rem',fontWeight:700,marginBottom:'0.4rem',lineHeight:1.3}}>{c.title}</div>
                <div style={{color:'var(--text3)',fontSize:'0.8rem',marginBottom:'1rem',lineHeight:1.5}}>{c.description?c.description.slice(0,80)+'...':''}</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'0.5rem',marginBottom:'1rem'}}>
                  {[{l:'Budget',v:fINR(c.budget),c:'#10B981'},{l:'Platform',v:c.platform||'All',c:'var(--p3)'},{l:'Min Followers',v:fNum(c.min_followers)||'Any',c:'var(--gold)'}].map(x=>(
                    <div key={x.l} style={{background:'var(--bg3)',borderRadius:8,padding:'0.5rem',textAlign:'center',border:'1px solid var(--border)'}}>
                      <div style={{fontFamily:'Syne',fontWeight:700,fontSize:'0.85rem',color:x.c}}>{x.v}</div>
                      <div style={{fontSize:'0.68rem',color:'var(--text3)',marginTop:'0.1rem'}}>{x.l}</div>
                    </div>
                  ))}
                </div>
                <button className="btn btn-primary btn-sm" style={{width:'100%',justifyContent:'center'}}
                  onClick={()=>showToast&&showToast(`🤖 Finding influencers for: ${c.title} — Budget: ${fINR(c.budget)}`)}>
                  🤖 Find Matching Influencers
                </button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}
