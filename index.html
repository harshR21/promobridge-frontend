<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // API BASE URL
        const API_BASE_URL = 'https://promobridge-backend0.onrender.com';

        // Token interceptor — yeh add kiya taaki login ke baad protected calls pe token auto jaaye
        axios.interceptors.request.use(config => {
            const token = localStorage.getItem('pb_token');
            if (token) {
                config.headers.Authorization = `Bearer ${token}`;
            }
            return config;
        });

        // Main App
        function App() {
            const [currentPage, setCurrentPage] = useState('home');
            const [showAuth, setShowAuth] = useState(false);
            const [user, setUser] = useState(null);

            const handleLogout = () => {
                setUser(null);
                localStorage.removeItem('pb_token');
            };

            return (
                <div>
                    <Navbar currentPage={currentPage} setCurrentPage={setCurrentPage} user={user} setShowAuth={setShowAuth} handleLogout={handleLogout} />
                    {showAuth && <AuthModal setShowAuth={setShowAuth} setUser={setUser} />}
                    {currentPage === 'home' && <HomePage setCurrentPage={setCurrentPage} />}
                    {currentPage === 'search' && <SearchPage />}
                    {currentPage === 'campaign' && <CampaignPage />}
                    {currentPage === 'pricing' && <PricingPage />}
                    {currentPage === 'dashboard' && <DashboardPage />}
                </div>
            );
        }

        // Auth Modal (token save fix)
        function AuthModal({ setShowAuth, setUser }) {
            const [tab, setTab] = useState('login');
            const [form, setForm] = useState({ email: '', password: '', role: 'brand' });
            const [msg, setMsg] = useState(null);
            const [error, setError] = useState(null);
            const [loading, setLoading] = useState(false);

            const handleLogin = async () => {
                setLoading(true); setError(null); setMsg(null);
                try {
                    const formData = new URLSearchParams();
                    formData.append('username', form.email);
                    formData.append('password', form.password);
                    const res = await axios.post(`${API_BASE_URL}/auth/login`, formData, {
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                    });
                    const token = res.data.access_token || res.data; // adjust as per your backend response
                    localStorage.setItem('pb_token', token);
                    setUser({ email: form.email, role: 'user' }); // role backend se le sakte ho agar aaye
                    setShowAuth(false);
                } catch (e) {
                    setError(e.response?.data?.detail || 'Login failed');
                }
                setLoading(false);
            };

            const handleRegister = async () => {
                setLoading(true); setError(null); setMsg(null);
                try {
                    await axios.post(`${API_BASE_URL}/auth/register`, form);
                    setMsg('Registered! Now login.');
                    setTab('login');
                } catch (e) {
                    setError(e.response?.data?.detail || 'Registration failed');
                }
                setLoading(false);
            };

            // tera original modal code yahan paste kar lena (same as before)
            // sirf handleLogin/handleRegister upar wale use kar
        }

        // PricingPage (POST with params fix)
        function PricingPage() {
            const [inputs, setInputs] = useState({
                followers: 50000,
                engagement_rate: 3.5,
                platform: 'instagram',
                content_type: 'post'
            });
            const [result, setResult] = useState(null);

            const calculatePricing = () => {
                axios.post(`${API_BASE_URL}/calculate-pricing`, null, { params: inputs })
                    .then(response => {
                        const d = response.data;
                        setResult({
                            suggested_price: Math.round(d.suggested_price * 83),
                            min_price: Math.round(d.min_price * 83),
                            max_price: Math.round(d.max_price * 83),
                        });
                    })
                    .catch(error => {
                        const price = (inputs.followers / 1000) * 830 * (1 + inputs.engagement_rate / 100);
                        setResult({
                            suggested_price: Math.round(price),
                            min_price: Math.round(price * 0.8),
                            max_price: Math.round(price * 1.2),
                        });
                    });
            };

            // tera original return code yahan paste kar (form + button + result display)
        }

        // SearchPage (influencers fetch)
        function SearchPage() {
            const [influencers, setInfluencers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [filters, setFilters] = useState({ platform: '', niche: '', minFollowers: '' });

            useEffect(() => {
                fetchInfluencers();
            }, []);

            const fetchInfluencers = () => {
                setLoading(true);
                const params = {};
                if (filters.platform) params.platform = filters.platform;
                if (filters.niche) params.niche = filters.niche;
                if (filters.minFollowers) params.min_followers = filters.minFollowers;

                axios.get(`${API_BASE_URL}/influencers`, { params })
                    .then(response => {
                        setInfluencers(response.data);
                        setLoading(false);
                    })
                    .catch(error => {
                        setInfluencers(getMockInfluencers());
                        setLoading(false);
                    });
            };

            // tera original return code yahan paste kar
        }

        // Yeh missing function add kiya (crash ka main reason tha yeh)
        function formatIndian(num) {
            if (!num || num === 0) return '0';
            if (num >= 10000000) return (num / 10000000).toFixed(1) + ' Cr';
            if (num >= 100000) return (num / 100000).toFixed(1) + ' L';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toLocaleString('en-IN');
        }
